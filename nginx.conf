# Drop this block inside your nginx server {} block
# (or in a separate /etc/nginx/conf.d/admiral-insights.conf)
#
# Assumes the app runs on port 3000 and you have SSL termination at nginx.
# Adjust server_name and paths to match your environment.

server {
    listen 443 ssl http2;
    server_name admiral.example.com;   # ← change to your domain

    ssl_certificate     /etc/letsencrypt/live/admiral.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admiral.example.com/privkey.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Proxy to Node
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Allow large Excel uploads
        client_max_body_size 50M;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name admiral.example.com;
    return 301 https://$host$request_uri;
}
